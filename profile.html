<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile — MyApp</title>

    <!-- Bootstrap 5 CSS -->
    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
        integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN"
        crossorigin="anonymous"
    />

    <!-- Bootstrap Icons -->
    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<!-- Spinner Overlay -->
<div id="spinnerOverlay" class="spinner-overlay d-none">
    <div class="spinner-border text-primary" role="status" style="width:3rem;height:3rem;">
        <span class="visually-hidden">Loading...</span>
    </div>
</div>

<!-- Navigation Bar -->
<nav class="navbar navbar-expand-lg navbar-dark" style="background:rgba(79,70,229,0.95);backdrop-filter:blur(6px);">
    <div class="container">
        <a class="navbar-brand fw-bold" href="profile.html">
            <i class="bi bi-person-circle me-1"></i> MyApp
        </a>
        <div class="ms-auto d-flex align-items-center gap-3">
            <span class="text-white opacity-75 d-none d-md-block" id="navUserName"></span>
            <button id="logoutBtn" class="btn btn-outline-light btn-sm px-3">
                <i class="bi bi-box-arrow-right me-1"></i> Logout
            </button>
        </div>
    </div>
</nav>

<div class="profile-wrapper">
    <div class="profile-card">

        <!-- Avatar + Name -->
        <div class="text-center mb-4">
            <div class="avatar-circle" id="avatarCircle">?</div>
            <h4 class="fw-bold mb-0" id="profileName">Loading…</h4>
            <p class="text-muted" id="profileEmail"></p>
        </div>

        <!-- Alert area -->
        <div id="alertBox" role="alert"></div>

        <!-- Profile Info Section -->
        <p class="section-title"><i class="bi bi-person-lines-fill me-1"></i>Personal Information</p>

        <div class="row g-3 mb-4">

            <div class="col-md-6">
                <label for="age" class="form-label">Age</label>
                <input
                    type="number"
                    id="age"
                    class="form-control"
                    placeholder="e.g. 22"
                    min="1"
                    max="120"
                />
            </div>

            <div class="col-md-6">
                <label for="dob" class="form-label">Date of Birth</label>
                <input
                    type="date"
                    id="dob"
                    class="form-control"
                />
            </div>

            <div class="col-md-6">
                <label for="contact" class="form-label">Contact Number</label>
                <input
                    type="tel"
                    id="contact"
                    class="form-control"
                    placeholder="e.g. +91 9876543210"
                    maxlength="15"
                />
            </div>

            <div class="col-md-6">
                <label for="address" class="form-label">Address</label>
                <input
                    type="text"
                    id="address"
                    class="form-control"
                    placeholder="e.g. 12 MG Road, Delhi"
                    maxlength="300"
                />
            </div>

            <div class="col-12">
                <label for="bio" class="form-label">Bio</label>
                <textarea
                    id="bio"
                    class="form-control"
                    rows="4"
                    placeholder="Tell us something about yourself…"
                    maxlength="500"
                ></textarea>
                <small class="text-muted"><span id="bioCount">0</span>/500</small>
            </div>

        </div>

        <!-- Last updated -->
        <p class="text-muted mb-3" style="font-size:0.82rem;" id="lastUpdated"></p>

        <!-- Action buttons -->
        <div class="d-flex gap-2 flex-wrap">
            <button id="saveProfileBtn" class="btn btn-primary px-4">
                <i class="bi bi-save me-1"></i> Save Profile
            </button>
            <button id="resetBtn" class="btn btn-outline-secondary px-4">
                <i class="bi bi-arrow-counterclockwise me-1"></i> Reset
            </button>
        </div>

    </div>
</div>

<!-- jQuery -->
<script src="https://code.jquery.com/jquery-3.7.1.min.js"
        integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
        crossorigin="anonymous"></script>

<!-- Bootstrap 5 JS bundle -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL"
        crossorigin="anonymous"></script>

<!-- Page JS -->
<script src="js/profile.js"></script>

</body>
</html>
